    <style>
        /* Custom header for loading page - logo aligned left */
        .loading-page-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1.5rem 2rem;
        }

        .loading-page-header .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .loading-page-header .logo-container a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        /* Header logo (independent of global .logo-text) */
        .loading8-logo-text {
            height: 72px;
            width: auto;
            object-fit: contain;
        }

        /* Namespaced loading overlay and content */
        .loading8-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100svh;
            background-color: transparent;
            z-index: 1000;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        .loading8-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading8-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading8-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .loading8-image-wrapper {
            width: 200px;
            height: 160px;
            overflow: hidden;
            position: relative;
        }

        .loading8-image-wrapper img,
        .loading8-image-wrapper video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
        }

        .loading8-image-wrapper img {
            animation: fadeInOut 0.8s ease-in-out;
        }

        .loading8-image-wrapper video {
            display: none;
        }

        .loading8-image-wrapper video.is-active {
            display: block;
        }

        .loading8-image-wrapper img.is-hidden {
            display: none;
        }

        .loading8-coming-soon {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: var(--text-dark);
            text-align: center;
        }

        /* Footer layout specific to loading page */
        .loading8-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 1.5rem 2rem 2rem;
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2rem;
            flex: 1;
            min-width: 0;
            width: 100%;
            z-index: 5;
        }

        .loading8-date-section {
            flex-shrink: 0;
            margin-bottom: 0;
        }

        .footer-details {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .loading8-venue-info {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
        }

        .loading8-venue-name {
            font-size: 0.875rem;
            color: var(--text-dark);
        }

        .loading8-venue-days,
        .loading8-venue-time {
            font-size: 0.8125rem;
            color: var(--text-dark);
        }

        .loading8-venue-icons {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .loading8-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dark);
            transition: opacity 0.3s ease;
        }

        .loading8-icon-btn:hover {
            opacity: 0.7;
        }

        a.loading8-icon-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .loading8-share-wrap {
            position: relative;
            display: inline-flex;
            z-index: 6;
        }

        .loading8-share-menu {
            position: absolute;
            bottom: calc(100% + 0.35rem);
            left: 0;
            right: auto;
            min-width: 11rem;
            max-width: min(12rem, calc(100vw - 2rem));
            background: var(--background-light);
            border: 1px solid rgba(41, 18, 76, 0.14);
            border-radius: 6px;
            box-shadow: 0 8px 28px rgba(41, 18, 76, 0.12);
            z-index: 20;
            pointer-events: auto;
        }

        .loading8-share-menu[hidden] {
            display: none !important;
        }

        .loading8-share-item {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            width: 100%;
            padding: 0.5rem 0.85rem;
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text-dark);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            text-decoration: none;
            transition: background 0.15s ease;
            box-sizing: border-box;
        }

        .loading8-share-icon-wrap {
            flex-shrink: 0;
            width: 1.25rem;
            height: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;

        .loading8-share-label {

        .loading8-share-item--more {

        .loading8-share-item:hover,

        /* Keyframes reused locally so the loading image works even without styles.css */

                max-height: 72px;

    <script>
        // ============================================================
        // PHOTO SLIDESHOW - Cycles through all photos in loadingPhotos
        // ============================================================

        // LIST OF ALL PHOTOS IN THE loadingPhotos FOLDER
        // Since browsers cannot scan folders, you must manually list them here.
        // When you add/remove photos, update this array.
        const loadingPhotos = [
            './assets/loadingPhotos/DSCF0375.JPG',
            './assets/loadingPhotos/DSCF0384.JPG',
            './assets/loadingPhotos/DSCF0403.JPG',
            './assets/loadingPhotos/IMG_2428.jpg',
            './assets/loadingPhotos/IMG_2736.jpg',
            './assets/loadingPhotos/IMG_2739.jpg',
            './assets/loadingPhotos/IMG_9734.jpg',
            './assets/loadingPhotos/IMG_9773.jpg',
            './assets/loadingPhotos/IMG_9827.jpg',
            './assets/loadingPhotos/PXL_20260108_044359167.MP.jpg',
            './assets/loadingPhotos/PXL_20260108_044505748.MP.jpg',
            './assets/loadingPhotos/PXL_20260108_044735494.MP.jpg',
            './assets/loadingPhotos/PXL_20260314_091902696.MP.jpg',
            './assets/loadingPhotos/photo_2025-12-12_17-57-37.jpg',
            './assets/loadingPhotos/photo_2025-12-18_17-40-52.jpg',
            './assets/loadingPhotos/photo_2025-12-18_17-40-53.jpg',
            './assets/loadingPhotos/photo_2026-01-14_15-43-44.jpg',
            './assets/loadingPhotos/Screenshot 2026-02-26 154921.png'
        ];

        // SLIDESHOW SETTINGS
        const slideshowInterval = 300;  // Time between photos in milliseconds (0.3 seconds)
        const photoPhaseDurationMs = 16.2 * 1000;  // Then switch to looping video

        // Current photo index
        let currentPhotoIndex = 0;
        let slideshowTimerId = null;

        // Preload all images for smooth loading
        function preloadImages() {
            loadingPhotos.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        }

        // Change to the next photo (no transition, instant switch)
        function showNextPhoto() {
            const imageElement = document.getElementById('loadingImage');
            if (!imageElement || loadingPhotos.length === 0) return;

            // Move to next photo (loop back to start when reaching end)
            currentPhotoIndex = (currentPhotoIndex + 1) % loadingPhotos.length;

            // Instantly change the image
            imageElement.src = loadingPhotos[currentPhotoIndex];
        }

        function switchToLoopVideo() {
            if (slideshowTimerId !== null) {
                clearInterval(slideshowTimerId);
                slideshowTimerId = null;
            }

            const imageElement = document.getElementById('loadingImage');
            const videoElement = document.getElementById('loadingVideo');
            if (!videoElement) return;

            if (imageElement) {
                imageElement.classList.add('is-hidden');
            }

            videoElement.classList.add('is-active');
            videoElement.setAttribute('aria-hidden', 'false');
            videoElement.muted = true;
            videoElement.loop = true;
            videoElement.playsInline = true;

            videoElement.play().catch(function () { });
        }

        // Start the slideshow when page loads
        document.addEventListener('DOMContentLoaded', function () {
            if (loadingPhotos.length > 1) {
                preloadImages();
                slideshowTimerId = setInterval(showNextPhoto, slideshowInterval);
            }

            setTimeout(switchToLoopVideo, photoPhaseDurationMs);
        });

        const LOADING8_SHARE_BODY = `We warmly invite you to join us at the DID Graduation Show 2026.

#SeeHowWeDidIt.

2026 Division of Industrial Design Graduation Show — Coming Soon. Check it out!`.trim();

        (function initLoading8ShareMenu() {
            var wrap = document.querySelector('.loading8-share-wrap');
            var btn = document.getElementById('loading8ShareBtn');
            var menu = document.getElementById('loading8ShareMenu');
            if (!wrap || !btn || !menu) return;

            var dataUrl = (wrap.getAttribute('data-share-url') || '').trim();
            function getShareUrl() {
                if (dataUrl) return dataUrl;
                try {
                    var u = new URL(window.location.href);
                    u.hash = '';
                    return u.href;
                } catch (err) {
                    return (window.location.href || '').split('#')[0];
                }
            }

            function buildSharePayload() {
                var shareUrl = getShareUrl();
                var shareText = LOADING8_SHARE_BODY;
                var line = shareText + (shareUrl ? '\n\n' + shareUrl : '');
                return { shareUrl: shareUrl, shareText: shareText, line: line };
            }

            function applyShareLinks() {
                var p = buildSharePayload();
                var u = p.shareUrl;
                var t = p.shareText;
                var line = p.line;

                var tg = menu.querySelector('[data-share="telegram"]');
                if (tg) {
                    tg.href = 'https://t.me/share/url?url=' + encodeURIComponent(u) + '&text=' + encodeURIComponent(t);
                }
                var wa = menu.querySelector('[data-share="whatsapp"]');
                if (wa) {
                    wa.href = 'https://api.whatsapp.com/send?text=' + encodeURIComponent(line || t || u);
                }
            }

            function setOpen(open) {
                menu.hidden = !open;
                btn.setAttribute('aria-expanded', open ? 'true' : 'false');
                if (open) applyShareLinks();
            }

            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(menu.hidden);
            });

            document.addEventListener('click', function (e) {
                if (menu.hidden) return;
                if (!wrap.contains(e.target)) setOpen(false);
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && !menu.hidden) setOpen(false);
            });

            var nativeShareBtn = menu.querySelector('[data-share="native"]');
            if (nativeShareBtn) {
                var nativeLabel = nativeShareBtn.querySelector('.loading8-share-label');

                function nativeCopyFeedback() {
                    if (nativeLabel) {
                        var orig = nativeLabel.textContent;
                        nativeLabel.textContent = 'Copied to clipboard';
                        window.setTimeout(function () { nativeLabel.textContent = orig; }, 2400);
                    }
                }

                function tryCopyText(textToCopy) {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        return navigator.clipboard.writeText(textToCopy);
                    }
                    return Promise.reject(new Error('no clipboard'));
                }

                function copyFallback(textToCopy) {
                    try {
                        var ta = document.createElement('textarea');
                        ta.value = textToCopy;
                        ta.setAttribute('readonly', '');
                        ta.style.position = 'fixed';
                        ta.style.top = '40%';
                        ta.style.left = '50%';
                        ta.style.transform = 'translate(-50%, -50%)';
                        ta.style.width = 'min(90vw, 24rem)';
                        ta.style.height = '4rem';
                        ta.style.zIndex = '13000';
                        ta.style.opacity = '0.01';
                        document.body.appendChild(ta);
                        ta.focus();
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        nativeCopyFeedback();
                    } catch (err) {
                        window.prompt('Copy this text (Ctrl+C, then Enter):', textToCopy);
                        nativeCopyFeedback();
                    }
                }

                function runNativeCopyFlow(copyStr) {
                    tryCopyText(copyStr).then(function () {
                        nativeCopyFeedback();
                        setOpen(false);
                    }).catch(function () {
                        copyFallback(copyStr);
                        setOpen(false);
                    });
                }

                nativeShareBtn.addEventListener('click', function () {
                    var p = buildSharePayload();
                    var textToCopy = p.line || p.shareUrl || p.shareText;
                    if (!textToCopy) return;

                    var sharePayload = {
                        title: 'DID Graduation Show 2026',
                        text: p.shareText,
                        url: p.shareUrl
                    };

                    if (navigator.share) {
                        navigator.share(sharePayload).then(function () {
                            setOpen(false);
                        }).catch(function (err) {
                            if (err && err.name === 'AbortError') return;
                            runNativeCopyFlow(textToCopy);
                        });
                        return;
                    }

                    runNativeCopyFlow(textToCopy);
                });
            }

            menu.querySelectorAll('a.loading8-share-item').forEach(function (a) {
                a.addEventListener('click', function (e) {
                    var resolved = a.getAttribute('href') || '';
                    if (!resolved || resolved === '#') {
                        e.preventDefault();
                        return;
                    }
                    window.setTimeout(function () {
                        setOpen(false);
                    }, 0);
                });
            });
        })();
    </script>
</body>

</html>
