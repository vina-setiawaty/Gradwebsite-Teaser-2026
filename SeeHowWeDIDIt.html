<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Division of Industrial Design Graduation Show - Coming Soon</title>
    <link rel="icon" type="image/png" href="assets/logo2026VerticalStaggered.png">
    <link rel="apple-touch-icon" href="assets/logo2026VerticalStaggered.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Custom header for loading page - logo aligned left */
        .loading-page-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1.5rem 2rem;
        }

        .loading-page-header .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .loading-page-header .logo-container a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        /* Header logo (independent of global .logo-text) */
        .loading8-logo-text {
            height: 72px;
            width: auto;
            object-fit: contain;
        }

        /* Namespaced loading overlay and content */
        .loading8-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100svh;
            background-color: transparent;
            z-index: 1000;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        .loading8-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading8-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loading8-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .loading8-image-wrapper {
            width: 200px;
            height: 160px;
            overflow: hidden;
            position: relative;
        }

        .loading8-image-wrapper img,
        .loading8-image-wrapper video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
        }

        .loading8-image-wrapper img {
            animation: fadeInOut 0.8s ease-in-out;
        }

        .loading8-image-wrapper video {
            display: none;
        }

        .loading8-image-wrapper video.is-active {
            display: block;
        }

        .loading8-image-wrapper img.is-hidden {
            display: none;
        }

        .loading8-coming-soon {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: var(--text-dark);
            text-align: center;
        }

        /* Footer layout specific to loading page */
        .loading8-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 1.5rem 2rem 2rem;
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2rem;
            flex: 1;
            min-width: 0;
            width: 100%;
        }

        .loading8-date-section {
            flex-shrink: 0;
            margin-bottom: 0;
        }

        .footer-details {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .loading8-venue-info {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
        }

        .loading8-venue-name {
            font-size: 0.875rem;
            color: var(--text-dark);
        }

        .loading8-venue-days,
        .loading8-venue-time {
            font-size: 0.8125rem;
            color: var(--text-dark);
        }

        .loading8-venue-icons {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .loading8-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dark);
            transition: opacity 0.3s ease;
        }

        .loading8-icon-btn:hover {
            opacity: 0.7;
        }

        a.loading8-icon-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .loading8-share-wrap {
            position: relative;
            display: inline-flex;
        }

        .loading8-share-menu {
            position: absolute;
            bottom: calc(100% + 0.35rem);
            right: 0;
            min-width: 11rem;
            padding: 0.35rem 0;
            background: var(--background-light);
            border: 1px solid rgba(41, 18, 76, 0.14);
            border-radius: 6px;
            box-shadow: 0 8px 28px rgba(41, 18, 76, 0.12);
            z-index: 1101;
        }

        .loading8-share-menu[hidden] {
            display: none !important;
        }

        .loading8-share-item {
            display: block;
            width: 100%;
            padding: 0.5rem 0.85rem;
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text-dark);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            text-decoration: none;
            transition: background 0.15s ease;
        }

        .loading8-share-item:hover,
        .loading8-share-item:focus-visible {
            background: rgba(41, 18, 76, 0.07);
            outline: none;
        }

        .loading8-footer-logo {
            display: flex;
            align-items: flex-end;
        }

        .loading8-footer-logo img {
            height: 140px;
            width: auto;
            display: block;
        }

        /* Keyframes reused locally so the loading image works even without styles.css */
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.98);
            }

            20% {
                opacity: 1;
                transform: scale(1);
            }

            80% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media screen and (max-width: 768px) {
            .footer-details {
                flex-direction: column-reverse;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .loading8-logo-text {
                height: 56px;
                width: auto;
                object-fit: contain;
            }

            .loading8-footer {
                padding: 2rem;
                /* flex-direction: column; */
                /* align-items: flex-start; */
            }

            .loading8-footer-logo img {
                width: auto;
                height: auto;
                max-height: 120px;
            }

            .loading8-image-wrapper {
                width: 180px;
                height: 144px;
            }

            .loading8-coming-soon {
                font-size: 0.8rem;
            }

            .loading8-footer-logo img {
                max-height: 96px;
            }
        }

        @media screen and (max-width: 480px) {
            .loading8-logo-text {
                height: 48px;
                width: auto;
                object-fit: contain;
            }

            .loading8-footer {
                /* gap: 1rem; */
            }

            .loading8-image-wrapper {
                width: 150px;
                height: 120px;
            }

            .loading8-footer-logo img {
                max-height: 72px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Canvas (global) -->
    <canvas id="backgroundCanvas"></canvas>

    <!-- Loading Page Content -->
    <div id="loadingOverlay" class="loading-overlay loading8-overlay" style="opacity: 1; visibility: visible;">
        <!-- Custom Header - Logo aligned right, no nav links -->
        <nav class="loading-page-header">
            <div class="logo-container">
                <a href="https://cde.nus.edu.sg/did/gradshows/2026/">
                    <!-- <img src="./assets/logoGroup2.svg" alt="2026" class="logo-year"> -->
                    <img src="./assets/logoDIDHorizontal.png" alt="Division of Industrial Design Graduation Show"
                        class="loading8-logo-text">
                </a>
            </div>
            <div class="loading8-footer-logo">
                <img src="./assets/logo2026VerticalStaggered.png" alt="2026">
                <!-- <img src="./assets/geneoLongLogo.svg" alt="Geneo" class="geneo-logo"> -->
            </div>
        </nav>

        <!-- Main Content - Loading Screen -->
        <main class="loading-screen loading8-screen">
            <div class="loading-container loading8-container">
                <p class="coming-soon loading8-coming-soon">SEE HOW WE DID IT!</p>
                <div class="loading-image-wrapper loading8-image-wrapper">
                    <img id="loadingImage" src="././assets/loadingPhotos/Screenshot 2026-02-26 154921.png"
                        alt="Loading">
                    <video id="loadingVideo" class="loading8-loop-video" src="./assets/loadingPhotos/C0804.mp4" loop
                        muted playsinline preload="auto" aria-hidden="true"></video>
                </div>
                <p class="coming-soon loading8-coming-soon">COMING SOON</p>
            </div>
        </main>

        <!-- Footer Section -->
        <footer class="footer loading8-footer">
            <div class="loading8-date-section">
                <div class="footer-details">
                    <div class="venue-info loading8-venue-info">
                        <p class="venue-name loading8-venue-name">Geneo, Singapore Science Park 1</p>
                        <p class="venue-days loading8-venue-days">11 - 15 June 2026</p>
                        <p class="venue-time loading8-venue-time">10AM - 8PM</p>
                    </div>
                    <div class="venue-icons loading8-venue-icons">
                        <a class="loading8-icon-btn" href="https://maps.app.goo.gl/fa3Wj8d9EWuB1vJaA"
                            target="_blank" rel="noopener noreferrer" aria-label="Location">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" aria-hidden="true">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                        </a>
                        <div class="loading8-share-wrap" data-share-url="">
                            <button type="button" class="loading8-icon-btn" id="loading8ShareBtn"
                                aria-label="Share" aria-expanded="false" aria-haspopup="true"
                                aria-controls="loading8ShareMenu">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" aria-hidden="true">
                                    <circle cx="18" cy="5" r="3"></circle>
                                    <circle cx="6" cy="12" r="3"></circle>
                                    <circle cx="18" cy="19" r="3"></circle>
                                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                                </svg>
                            </button>
                            <div id="loading8ShareMenu" class="loading8-share-menu" role="group"
                                aria-label="Share on social media" hidden>
                                <a class="loading8-share-item" data-share="telegram" href="#" target="_blank"
                                    rel="noopener noreferrer">Telegram</a>
                                <button type="button" class="loading8-share-item" data-share="instagram">
                                    Instagram</button>
                                <a class="loading8-share-item" data-share="linkedin" href="#" target="_blank"
                                    rel="noopener noreferrer">LinkedIn</a>
                                <a class="loading8-share-item" data-share="whatsapp" href="#" target="_blank"
                                    rel="noopener noreferrer">WhatsApp</a>
                                <a class="loading8-share-item" data-share="threads" href="#" target="_blank"
                                    rel="noopener noreferrer">Threads</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


    </div>
    </footer>
    </div>

    <script src="canvas.js"></script>
    <script>
        // ============================================================
        // PHOTO SLIDESHOW - Cycles through all photos in loadingPhotos
        // ============================================================

        // LIST OF ALL PHOTOS IN THE loadingPhotos FOLDER
        // Since browsers cannot scan folders, you must manually list them here.
        // When you add/remove photos, update this array.
        const loadingPhotos = [
            './assets/loadingPhotos/DSCF0375.JPG',
            './assets/loadingPhotos/DSCF0384.JPG',
            './assets/loadingPhotos/DSCF0403.JPG',
            './assets/loadingPhotos/IMG_2428.jpg',
            './assets/loadingPhotos/IMG_2736.jpg',
            './assets/loadingPhotos/IMG_2739.jpg',
            './assets/loadingPhotos/IMG_9734.jpg',
            './assets/loadingPhotos/IMG_9773.jpg',
            './assets/loadingPhotos/IMG_9827.jpg',
            './assets/loadingPhotos/PXL_20260108_044359167.MP.jpg',
            './assets/loadingPhotos/PXL_20260108_044505748.MP.jpg',
            './assets/loadingPhotos/PXL_20260108_044735494.MP.jpg',
            './assets/loadingPhotos/PXL_20260314_091902696.MP.jpg',
            './assets/loadingPhotos/photo_2025-12-12_17-57-37.jpg',
            './assets/loadingPhotos/photo_2025-12-18_17-40-52.jpg',
            './assets/loadingPhotos/photo_2025-12-18_17-40-53.jpg',
            './assets/loadingPhotos/photo_2026-01-14_15-43-44.jpg',
            './assets/loadingPhotos/Screenshot 2026-02-26 154921.png'
        ];

        // SLIDESHOW SETTINGS
        const slideshowInterval = 300;  // Time between photos in milliseconds (0.5 seconds)
        const photoPhaseDurationMs = 27 * 1000;  // Then switch to looping video

        // Current photo index
        let currentPhotoIndex = 0;
        let slideshowTimerId = null;

        // Preload all images for smooth loading
        function preloadImages() {
            loadingPhotos.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        }

        // Change to the next photo (no transition, instant switch)
        function showNextPhoto() {
            const imageElement = document.getElementById('loadingImage');
            if (!imageElement || loadingPhotos.length === 0) return;

            // Move to next photo (loop back to start when reaching end)
            currentPhotoIndex = (currentPhotoIndex + 1) % loadingPhotos.length;

            // Instantly change the image
            imageElement.src = loadingPhotos[currentPhotoIndex];
        }

        function switchToLoopVideo() {
            if (slideshowTimerId !== null) {
                clearInterval(slideshowTimerId);
                slideshowTimerId = null;
            }

            const imageElement = document.getElementById('loadingImage');
            const videoElement = document.getElementById('loadingVideo');
            if (!videoElement) return;

            if (imageElement) {
                imageElement.classList.add('is-hidden');
            }

            videoElement.classList.add('is-active');
            videoElement.setAttribute('aria-hidden', 'false');
            videoElement.muted = true;
            videoElement.loop = true;
            videoElement.playsInline = true;

            videoElement.play().catch(function () { });
        }

        // Start the slideshow when page loads
        document.addEventListener('DOMContentLoaded', function () {
            if (loadingPhotos.length > 1) {
                preloadImages();
                slideshowTimerId = setInterval(showNextPhoto, slideshowInterval);
            }

            setTimeout(switchToLoopVideo, photoPhaseDurationMs);
        });

        (function initLoading8ShareMenu() {
            var wrap = document.querySelector('.loading8-share-wrap');
            var btn = document.getElementById('loading8ShareBtn');
            var menu = document.getElementById('loading8ShareMenu');
            if (!wrap || !btn || !menu) return;

            var dataUrl = (wrap.getAttribute('data-share-url') || '').trim();
            function getShareUrl() {
                if (dataUrl) return dataUrl;
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    return window.location.href.split('#')[0];
                }
                return '';
            }

            function buildSharePayload() {
                var shareUrl = getShareUrl();
                var shareText = (document.title || '').trim();
                var line = shareText && shareUrl ? shareText + '\n' + shareUrl : (shareUrl || shareText);
                return { shareUrl: shareUrl, shareText: shareText, line: line };
            }

            function applyShareLinks() {
                var p = buildSharePayload();
                var u = p.shareUrl;
                var t = p.shareText;
                var line = p.line;

                var tg = menu.querySelector('[data-share="telegram"]');
                if (tg) {
                    tg.href = u
                        ? 'https://t.me/share/url?url=' + encodeURIComponent(u) + '&text=' + encodeURIComponent(t)
                        : '#';
                }
                var li = menu.querySelector('[data-share="linkedin"]');
                if (li) {
                    li.href = u ? 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(u) : '#';
                }
                var wa = menu.querySelector('[data-share="whatsapp"]');
                if (wa) {
                    wa.href = line ? 'https://api.whatsapp.com/send?text=' + encodeURIComponent(line) : '#';
                }
                var th = menu.querySelector('[data-share="threads"]');
                if (th) {
                    th.href = line ? 'https://www.threads.net/intent/post?text=' + encodeURIComponent(line) : '#';
                }
            }

            function setOpen(open) {
                menu.hidden = !open;
                btn.setAttribute('aria-expanded', open ? 'true' : 'false');
                if (open) applyShareLinks();
            }

            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                setOpen(menu.hidden);
            });

            document.addEventListener('click', function () {
                if (!menu.hidden) setOpen(false);
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && !menu.hidden) setOpen(false);
            });

            wrap.addEventListener('click', function (e) {
                e.stopPropagation();
            });

            var igBtn = menu.querySelector('[data-share="instagram"]');
            if (igBtn) {
                igBtn.addEventListener('click', function () {
                    var p = buildSharePayload();
                    var textToCopy = p.line || p.shareUrl || p.shareText;
                    if (!textToCopy) return;

                    function feedback() {
                        var orig = igBtn.textContent;
                        igBtn.textContent = 'Link copied';
                        setTimeout(function () { igBtn.textContent = orig; }, 1800);
                    }

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(textToCopy).then(feedback).catch(function () { });
                    } else {
                        try {
                            var ta = document.createElement('textarea');
                            ta.value = textToCopy;
                            ta.setAttribute('readonly', '');
                            ta.style.position = 'fixed';
                            ta.style.left = '-9999px';
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            document.body.removeChild(ta);
                            feedback();
                        } catch (err) { }
                    }
                    setOpen(false);
                });
            }

            menu.querySelectorAll('a.loading8-share-item').forEach(function (a) {
                a.addEventListener('click', function (e) {
                    var href = a.getAttribute('href');
                    if (!href || href === '#') e.preventDefault();
                    setOpen(false);
                });
            });
        })();
    </script>
</body>

</html>
